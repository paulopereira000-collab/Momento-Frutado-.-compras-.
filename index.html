<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#2a2a2a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Momento Frutado"/>
  <title>Momento Frutado – Compras</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #eeeeee;
      --green: #7CA37C;
      --green-dark: #5a7a5a;
      --green-light: #e8f5e9;
      --text: #1a1a1a;
      --text-mid: #424242;
      --text-dim: #9e9e9e;
      --border: #e0e0e0;
      --error: #c62828;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: inherit; cursor: pointer; }
    textarea { -webkit-user-select: text; user-select: text; }

    /* LOADING */
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:14px; background:#f5f5f5; }
    .ld-title { font-size:22px; font-weight:800; color:var(--green); }
    .ld-sub { font-size:12px; color:var(--text-dim); }

    /* SHELL */
    #app { max-width:600px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

    /* HEADER */
    #header { background:#000000; padding:9px 16px 0; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    #header-nav { display:flex; align-items:center; justify-content:space-between; padding:9px 0 10px; }
    #header-icons { display:flex; gap:8px; }
    .hnav-btn { border:none; background:transparent; color:#888; padding:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
    #brand-nav-btn { font-size:14px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase; padding:6px 8px; }
    .hnav-btn .material-icons-round { font-size:20px; }
    .hnav-btn.active { color:var(--green); }



    /* SCROLL */
    #scroll-area { flex:1; overflow-y:auto; padding-bottom:16px; }
    .view { display:none; }
    .view.active { display:block; }

    /* SEARCH */

    /* CATEGORY */
    .cat-wrap { padding:10px 14px 0; }
    .cat-header { display:flex; align-items:center; justify-content:space-between; padding:6px 4px; cursor:pointer; user-select:none; background:var(--green); border-radius:8px; margin-bottom:4px; }
    .cat-name { font-size:12px; font-weight:700; color:#ffffff; text-transform:uppercase; letter-spacing:normal; padding-left:4px; }
    .cat-chevron { font-size:14px; color:#ffffff; transition:transform 0.2s; }
    .cat-chevron.closed { transform:rotate(-90deg); }
    .cat-body.collapsed { display:none; }
    .cat-body { background:#ffffff; }

    /* SUBCAT SPACER */
    .subcat-spacer { height:70px; display:block; background:#f5f5f5; margin:0; border-radius:0; }

    /* ITEM ROWS */
    .item-row { display:flex; align-items:center; gap:16px; padding:9px 4px; border-bottom:1px solid rgba(0,0,0,0.04); border-radius:0; user-select:none; -webkit-user-select:none; }
    .item-row.zebra-even { background:#e8f5e9; }
    .item-row.zebra-odd  { background:#ffffff; }
    .item-row.active { }
    .item-name { flex:1; font-size:25px; font-weight:400; color:var(--text-mid); line-height:1.2; }
    .item-name.active { font-weight:800; color:var(--text); font-size:25px; }

    /* QTY */
    .qty-wrap { display:flex; align-items:center; gap:6px; }
    .qty-display { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:400; color:#1a1a1a; background:#e8f5e9; border:none; cursor:pointer; transition:all 0.2s; }
    .qty-display.active { background:#c8e6c9; color:#1a1a1a; box-shadow: 0 2px 8px rgba(124,163,124,0.3); font-weight:800; }
    .qty-input-inline { width:48px; height:48px; text-align:center; font-size:22px; font-weight:400; border:2px solid var(--green); border-radius:50%; color:#1a1a1a; background:#c8e6c9; font-family:inherit; outline:none; }

    /* CLEAR */
    #clear-wrap { padding:16px 18px 0; }
    #clear-btn { width:100%; padding:13px; background:#fff5f5; border:1.5px solid #ffcdd2; border-radius:10px; color:var(--error); font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:7px; }

    /* WHATSAPP */
    #wa-content { padding:16px 14px; }
    #wa-empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    #wa-empty .wa-icon { font-size:52px; margin-bottom:12px; }
    #wa-empty .wa-title { font-size:17px; font-weight:700; color:var(--text-mid); }
    #wa-empty .wa-sub { font-size:14px; margin-top:6px; }
    #wa-hint { background:var(--green-light); border-radius:12px; padding:13px 15px; margin-bottom:12px; font-size:14px; color:var(--green-dark); font-weight:600; line-height:1.5; border-left:4px solid var(--green); }
    #wa-text { width:100%; padding:14px; border-radius:12px; border:1px solid var(--border); font-size:15px; line-height:2; font-family:monospace; color:var(--text); background:var(--surface); resize:none; outline:none; }
    #wa-text:focus { border-color:var(--green); }

    /* ADD/MANAGE */
    #add-content { padding:14px; }
    .form-card { background:var(--surface); border-radius:14px; padding:18px; border:1px solid var(--border); margin-bottom:14px; }
    .form-card-title { font-size:15px; font-weight:800; color:var(--text); margin-bottom:16px; }
    .form-label { font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:5px; display:block; text-transform:uppercase; letter-spacing:0.5px; }
    .md-input, .md-select { width:100%; padding:12px 13px; border-radius:10px; border:1px solid var(--border); font-size:16px; margin-bottom:12px; font-family:inherit; outline:none; background:#fff; color:var(--text); transition:border-color 0.15s; }
    .md-input:focus, .md-select:focus { border-color:var(--green); }
    .btn-primary { width:100%; padding:14px; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; margin-bottom:8px; }
    .btn-secondary { width:100%; padding:12px; background:var(--green-light); color:var(--green-dark); border:none; border-radius:10px; font-size:15px; font-weight:600; }

    /* MANAGE */
    .manage-cat-block { background:var(--surface); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:10px; }
    .manage-cat-hdr { padding:11px 14px; background:var(--surface2); display:flex; justify-content:space-between; align-items:center; cursor:pointer; border-bottom:1px solid var(--border); }
    .manage-cat-hdr span { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
    .manage-cat-body.collapsed { display:none; }
    .manage-subcat-block { background:#fafafa; border-radius:10px; margin:8px; border:1px solid var(--border); overflow:hidden; }
    .manage-subcat-hdr { display:flex; align-items:center; gap:8px; padding:11px 14px; background:#d4e8d4; border-bottom:1px solid #b8d4b8; }
    .manage-subcat-title { flex:1; font-size:13px; font-weight:800; color:#2e5e2e; text-transform:uppercase; letter-spacing:0.5px; }
    .manage-row { display:flex; align-items:center; gap:8px; padding:14px 14px; border-top:1px solid #e8e8e8; }
    .manage-name { flex:1; font-size:20px; font-weight:500; color:var(--text); }
    .manage-edit-input { flex:1; font-size:17px; border:1.5px solid var(--green); border-radius:8px; padding:6px 10px; font-family:inherit; outline:none; background:#fff; }
    .manage-add-row { padding:10px 12px 14px; }
    .manage-add-input { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:18px; font-family:inherit; outline:none; background:#fff; }
    .manage-add-input:focus { border-color:var(--green); }
    .btn-add-subcat { width:calc(100% - 16px); margin:8px; padding:10px; background:var(--green-light); border:none; border-radius:8px; font-size:14px; font-weight:700; color:var(--green-dark); }
    .btn-icon { width:36px; height:36px; border:none; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:15px; background:transparent; }
    .btn-edit { color:#1565c0; }
    .btn-move { color:var(--green); }
    .btn-delete { color:var(--error); }
    .btn-save { color:var(--green); }
    .btn-cancel-edit { color:var(--text-dim); }



    /* SNACK */
    /* HISTORY */
    .hist-toggle { display:flex; background:#f0f0f0; border-radius:10px; padding:3px; margin-bottom:14px; }
    .hist-toggle-btn { flex:1; padding:8px; border:none; background:transparent; border-radius:8px; font-size:13px; font-weight:700; color:#9e9e9e; cursor:pointer; font-family:'Nunito',sans-serif; }
    .hist-toggle-btn.active { background:#fff; color:#1a1a1a; box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .hist-week { background:#fff; border-radius:12px; border:1px solid #e0e0e0; margin-bottom:10px; overflow:hidden; }
    .hist-week-hdr { padding:12px 14px; background:#f5f5f5; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .hist-week-label { font-size:14px; font-weight:800; color:#1a1a1a; }
    .hist-week-count { font-size:12px; color:#9e9e9e; }
    .hist-week-body.collapsed { display:none; }
    .hist-item { display:flex; align-items:center; padding:9px 14px; border-top:1px solid #f0f0f0; gap:10px; }
    .hist-item-name { flex:1; font-size:16px; color:#424242; font-weight:500; }
    .hist-item-detail { font-size:13px; color:#9e9e9e; text-align:right; line-height:1.5; }
    .hist-product { background:#fff; border-radius:12px; border:1px solid #e0e0e0; margin-bottom:10px; overflow:hidden; }
    .hist-product-hdr { padding:12px 14px; background:#f5f5f5; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .hist-product-name { font-size:14px; font-weight:800; color:#1a1a1a; }
    .hist-product-body.collapsed { display:none; }
    .hist-price-row { display:flex; align-items:center; padding:9px 14px; border-top:1px solid #f0f0f0; gap:10px; }
    .hist-price-date { font-size:13px; color:#9e9e9e; flex:1; }
    .hist-price-val { font-size:15px; font-weight:700; color:#2e7d32; }
    .hist-price-sup { font-size:13px; color:#9e9e9e; }
    .hist-empty { text-align:center; padding:60px 20px; color:#9e9e9e; font-size:15px; }

    /* PICKED */
    .item-name.picked { color:#b0b0b0 !important; font-weight:400 !important; font-size:25px !important; }
    .qty-display.picked { opacity:0.3; }
    .pick-btn { border:none; background:transparent; font-size:18px; color:#d0d0d0; cursor:pointer; padding:2px; flex-shrink:0; line-height:1; }
    .pick-btn.pick-hidden { visibility:hidden; pointer-events:none; }
    .pick-btn.picked { color:#7CA37C; }

    /* LONG PRESS PANEL */
    #pick-panel {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:600px; background:#7CA37C;
      border-radius:20px 20px 0 0; padding:0 0 28px;
      box-shadow:0 -4px 24px rgba(0,0,0,0.2); z-index:200;
      display:none; overflow:hidden;
    }
    #pick-panel.open { display:block; }
    #pick-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:199; display:none; }
    #pick-overlay.open { display:block; }
    #pick-title { font-size:18px; font-weight:800; color:#ffffff; margin-bottom:16px; font-family:'Nunito',sans-serif; }
    .pick-field-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.7); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; display:block; }
    #pick-price { width:100%; padding:12px 14px; border:1.5px solid #444; border-radius:10px; font-size:18px; font-family:'Nunito',sans-serif; outline:none; margin-bottom:12px; background:#2a2a2a; color:#fff; }
    #pick-price:focus { border-color:#7CA37C; }
    #pick-sell-price { width:100%; padding:12px 14px; border:1.5px solid #444; border-radius:10px; font-size:18px; font-family:'Nunito',sans-serif; outline:none; margin-bottom:12px; background:#2a2a2a; color:#fff; }
    #pick-sell-price:focus { border-color:#7CA37C; }
    #pick-supplier { width:100%; padding:12px 14px; border:1.5px solid #444; border-radius:10px; font-size:16px; font-family:'Nunito',sans-serif; outline:none; margin-bottom:12px; background:#2a2a2a; color:#fff; }
    #pick-supplier:focus { border-color:#7CA37C; }
    #pick-close { width:100%; padding:12px; border:1.5px solid #444; border-radius:10px; font-size:15px; font-weight:600; background:transparent; color:#888; cursor:pointer; font-family:'Nunito',sans-serif; }

    #snackbar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); border-radius:8px; padding:9px 18px; font-size:13px; font-weight:600; box-shadow:0 3px 12px rgba(0,0,0,0.18); z-index:300; display:none; color:#fff; white-space:nowrap; }
    #snackbar.saving { background:#f57f17; }
    #snackbar.saved  { background:var(--green); }
    #snackbar.error  { background:var(--error); }
  </style>
</head>
<body>

<div id="loading">
  <div class="ld-title">Momento Frutado</div>
  <div class="ld-sub">A carregar...</div>
</div>

<div id="app" style="display:none">
  <div id="header">

    <div id="header-nav">
      <button class="hnav-btn active" data-view="list" id="brand-nav-btn">Momento Frutado</button>
      <div id="header-icons">
        <button class="hnav-btn" data-view="whatsapp"><span class="material-icons-round">chat_bubble_outline</span></button>
        <button class="hnav-btn" data-view="history"><span class="material-icons-round">history</span></button>
        <button class="hnav-btn" data-view="add"><span class="material-icons-round">tune</span></button>
      </div>
    </div>



  </div>

  <div id="scroll-area">
    <div id="view-list" class="view active">

      <div id="cat-list" style="padding-top:6px"></div>
      <div id="clear-wrap"><button id="clear-btn">Limpar lista</button></div>
    </div>

    <div id="view-whatsapp" class="view">
      <div id="wa-content">
        <div id="wa-empty">
          <div class="wa-icon">📋</div>
          <div class="wa-title">Lista ainda vazia</div>
          <div class="wa-sub">Vai à lista e insere as quantidades</div>
        </div>
        <div id="wa-prices" style="display:none; margin-bottom:16px;">
          <div id="wa-prices-hint" style="background:#e8f5e9; border-radius:12px; padding:13px 15px; margin-bottom:12px; font-size:14px; color:#2e7d32; font-weight:600; line-height:1.5; border-left:4px solid #7CA37C;">👆 Mantém o dedo no texto → <strong>Seleccionar tudo</strong> → <strong>Copiar</strong></div>
          <div style="font-size:12px; font-weight:700; color:#9e9e9e; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;">Alterações de preço</div>
          <textarea id="wa-prices-text" readonly style="width:100%; padding:14px; border-radius:12px; border:1px solid #e0e0e0; font-size:15px; line-height:2; font-family:monospace; color:#1a1a1a; background:#fff; resize:none; outline:none;"></textarea>
        </div>
        <div id="wa-filled" style="display:none">
          <div id="wa-hint">Mantém o dedo no texto → <strong>Seleccionar tudo</strong> → <strong>Copiar</strong></div>
          <textarea id="wa-text" readonly></textarea>
        </div>
      </div>
    </div>

    <div id="view-history" class="view">
      <div id="history-content" style="padding:14px"></div>
    </div>

    <div id="view-add" class="view">
      <div id="add-content">
        <div class="form-card">
          <div class="form-card-title">Adicionar produto</div>
          <label class="form-label">Categoria</label>
          <select id="cat-select" class="md-select"></select>
          <div id="subcat-select-wrap" style="display:none">
            <label class="form-label">Subcategoria</label>
            <select id="subcat-select" class="md-select"></select>
          </div>
          <div id="new-cat-wrap" style="display:none">
            <label class="form-label">Nova categoria</label>
            <input id="new-cat-input" class="md-input" placeholder="Ex: 🌿 Ervas aromáticas"/>
          </div>
          <label class="form-label">Nome do produto</label>
          <input id="new-item-input" class="md-input" placeholder="Ex: Manga Tommy"/>
          <button id="add-btn" class="btn-primary">Adicionar produto</button>
          <button id="cancel-btn" class="btn-secondary">Cancelar</button>
        </div>
        <div class="form-card">
          <div class="form-card-title">Gerir produtos existentes</div>
          <div id="manage-list"></div>
        </div>
      </div>
    </div>
  </div>


  <!-- LONG PRESS PANEL -->
  <div id="pick-overlay"></div>
  <div id="pick-panel" style="background:#1a1a1a;">
    <div id="pick-title">Produto</div>
    <label class="pick-field-label">💶 Preço de compra/kg</label>
    <input id="pick-price" type="number" inputmode="decimal" placeholder="Ex: 1.20" step="0.01" min="0"/>
    <label class="pick-field-label">🏷️ Preço de venda</label>
    <input id="pick-sell-price" type="number" inputmode="decimal" placeholder="Ex: 2.50" step="0.01" min="0"/>
    <label class="pick-field-label">📅 Data</label>
    <input id="pick-date" type="date" style="width:100%;padding:12px 14px;border:1.5px solid #444;border-radius:10px;font-size:16px;font-family:'Nunito',sans-serif;outline:none;margin-bottom:12px;background:#2a2a2a;color:#fff;"/>
    <label class="pick-field-label">🏪 Fornecedor</label>
    <select id="pick-supplier">
      <option value="">— escolher fornecedor —</option>
    </select>
    <button id="pick-close">Fechar</button>
  </div>
</div>

<div id="snackbar"></div>

<script>

// ── STATE ─────────────────────────────────────────────────────────────────────
let products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
let subcats  = JSON.parse(JSON.stringify(DEFAULT_SUBCATS));
let list     = {};
let openCats = {};
let saveTimer = null;
let picked = {}; // key -> { done, price, supplier, date }
let history = []; // array of weekly snapshots

// ── HELPERS ───────────────────────────────────────────────────────────────────
function gk(cat, item) { return `${cat}|||${item}`; }

function buildEmpty(prods) {
  const out = {};
  Object.entries(prods).forEach(([cat, items]) =>
    items.forEach(item => { out[gk(cat, item)] = { qty: 0 }; })
  );
  return out;
}

function initOpen(prods) {
  Object.keys(prods).forEach(c => {
    if (openCats[c] === undefined) openCats[c] = !CLOSED_BY_DEFAULT.includes(c);
  });
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function payload() { return { products, subcats, list, picked, history }; }

function applyLocal(r) {
  if (r.products) products = r.products;
  if (r.picked) picked = r.picked;
  if (r.history) history = r.history;
  if (r.subcats && Object.keys(r.subcats).length > 0) subcats = r.subcats;
  else subcats = JSON.parse(JSON.stringify(DEFAULT_SUBCATS));
  if (r.list) list = { ...buildEmpty(products), ...r.list };
  else        list = buildEmpty(products);
  initOpen(products);
}

function sched() {
  localStorage.setItem(LS_CACHE, JSON.stringify(payload()));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const n = new Date();
    document.getElementById("sync-label").textContent = `Guardado ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  }, 300);
}

function boot() {
  const cached = localStorage.getItem(LS_CACHE);
  if (cached) {
    try { applyLocal(JSON.parse(cached)); }
    catch { list = buildEmpty(products); initOpen(products); }
  } else {
    list = buildEmpty(products); initOpen(products);
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.cssText = "display:flex;flex-direction:column;";
  renderCats("");
}

// ── WHATSAPP ──────────────────────────────────────────────────────────────────
function toWA() {
  const lines = [];
  Object.entries(products).forEach(([cat, items]) => {
    // Collect rows grouped by subcat if applicable
    let catRows = [];
    if (subcats[cat]) {
      subcats[cat].forEach((group, gi) => {
        const groupRows = group.items
          .map(item => ({ item, qty: Number(list[gk(cat, item)]?.qty || 0) }))
          .filter(e => e.qty > 0)
          .map(e => `${e.qty} ${e.item.toLowerCase()}`);
        if (groupRows.length) {
          if (catRows.length) catRows.push("", ""); // 2 blank lines between subcats
          catRows.push(...groupRows);
        }
      });
    } else {
      items.forEach((item, idx) => {
        const qty = Number(list[gk(cat, item)]?.qty || 0);
        if (qty) { catRows.push(`${qty} ${item.toLowerCase()}`); catRows.push(""); }
      });
      if (catRows.length && catRows[catRows.length-1]==="") catRows.pop();
    }
    if (catRows.length) {
      if (lines.length) lines.push("", "", ""); // 3 blank lines between categories
      const label = cat.replace(/^[\p{Emoji}\s]+/u, "").trim();
      lines.push(`*${label}*`, "");
      lines.push(...catRows);
    }
  });
  return lines.join("\n").trim();
}

// ── RENDER HEADER ─────────────────────────────────────────────────────────────
function pad(n) { return n.toString().padStart(2, "0"); }

function renderHdr() {
  const total  = Object.keys(list).length;
  const filled = Object.values(list).filter(e => Number(e.qty) > 0).length;
  document.getElementById("progress-pill").textContent = `${filled}/${total}`;
  document.getElementById("progress-fill").style.width = total ? `${(filled/total)*100}%` : "0%";
}

// ── RENDER CATS ───────────────────────────────────────────────────────────────
function renderCats(search) {
  const c = document.getElementById("cat-list"); c.innerHTML = "";
  Object.entries(products).forEach(([cat, items]) => {
    const open = openCats[cat] !== false;
    const wrap = document.createElement("div"); wrap.className = "cat-wrap";

    const hdr = document.createElement("div"); hdr.className = "cat-header";
    hdr.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-chevron ${open?"":"closed"}">▾</span>`;
    hdr.addEventListener("click", () => { openCats[cat] = !open; renderCats(""); });
    wrap.appendChild(hdr);

    const body = document.createElement("div"); body.className = "cat-body" + (open ? "" : " collapsed");

    if (subcats[cat]) {
      // Render with subcategory spacers
      subcats[cat].forEach((group, gi) => {
        const gItems = search ? group.items.filter(i => i.toLowerCase().includes(search.toLowerCase())) : group.items;
        if (!gItems.length) return;
        if (gi > 0) { const sp = document.createElement("div"); sp.className = "subcat-spacer"; body.appendChild(sp); }
        gItems.forEach((item, idx) => {
          const key = gk(cat, item), e = list[key] || { qty: 0 }, active = Number(e.qty) > 0;
          const isPicked = picked[key]?.done;
          const row = document.createElement("div");
          row.className = "item-row " + (idx % 2 === 0 ? "zebra-even" : "zebra-odd") + (active ? " active" : "");
          const nm = document.createElement("span"); nm.className = "item-name" + (active ? " active" : "") + (isPicked ? " picked" : "");
          nm.innerHTML = item;
          const qtyEl = makeQty(key, Number(e.qty));
          if (isPicked) { const qd = qtyEl.querySelector(".qty-display"); if(qd) qd.classList.add("picked"); }
          row.dataset.key = key;
          addLongPress(row, () => openPickPanel(cat, item));
          row.appendChild(nm);
          const pb = document.createElement("button");
          pb.className = "pick-btn material-icons-round" + (isPicked ? " picked" : "") + (active ? "" : " pick-hidden");
          pb.textContent = isPicked ? "task_alt" : "radio_button_unchecked";
          if (active) pb.addEventListener("click", ev => { ev.stopPropagation(); picked[key] = { ...picked[key], done: !picked[key]?.done }; sched(); renderCats(""); });
          row.appendChild(pb);
          row.appendChild(qtyEl); body.appendChild(row);
        });
      });
    } else {
      const filtered = search ? items.filter(i => i.toLowerCase().includes(search.toLowerCase())) : items;
      filtered.forEach((item, idx) => {
        const key = gk(cat, item), e = list[key] || { qty: 0 }, active = Number(e.qty) > 0;
        const isPicked2 = picked[key]?.done;
        const row = document.createElement("div");
        row.className = "item-row " + (idx % 2 === 0 ? "zebra-even" : "zebra-odd") + (active ? " active" : "");
        const nm = document.createElement("span"); nm.className = "item-name" + (active ? " active" : "") + (isPicked2 ? " picked" : "");
        nm.innerHTML = item;
        const qtyEl2 = makeQty(key, Number(e.qty));
        if (isPicked2) { const qd = qtyEl2.querySelector(".qty-display"); if(qd) qd.classList.add("picked"); }
        row.dataset.key = key;
        addLongPress(row, () => openPickPanel(cat, item));
        row.appendChild(nm);
        const pb2 = document.createElement("button");
        pb2.className = "pick-btn material-icons-round" + (isPicked2 ? " picked" : "") + (active ? "" : " pick-hidden");
        pb2.textContent = isPicked2 ? "task_alt" : "radio_button_unchecked";
        if (active) pb2.addEventListener("click", ev => { ev.stopPropagation(); picked[key] = { ...picked[key], done: !picked[key]?.done }; sched(); renderCats(""); });
        row.appendChild(pb2);
        row.appendChild(qtyEl2); body.appendChild(row);
      });
    }

    wrap.appendChild(body); c.appendChild(wrap);
  });
  renderHdr();
}

// ── QTY CONTROL ───────────────────────────────────────────────────────────────
function makeQty(key, qty) {
  const wrap = document.createElement("div"); wrap.className = "qty-wrap";
  const rr = () => { renderCats(""); renderWA(); };

  const display = document.createElement("div"); display.className = "qty-display" + (qty > 0 ? " active" : ""); display.textContent = qty > 0 ? qty : "—";
  display.addEventListener("click", () => {
    const inp = document.createElement("input"); inp.type = "number"; inp.inputMode = "numeric"; inp.pattern = "[0-9]*"; inp.className = "qty-input-inline"; inp.value = qty > 0 ? qty : "";
    wrap.replaceChild(inp, display); inp.focus(); inp.select();
    const commit = () => { const n = parseInt(inp.value, 10); list[key] = { qty: isNaN(n)||n<0?0:Math.min(999,n) }; sched(); rr(); };
    inp.addEventListener("blur", commit); inp.addEventListener("keydown", e => { if (e.key==="Enter") inp.blur(); });
  });

  wrap.appendChild(display);
  return wrap;
}

// ── RENDER WHATSAPP ───────────────────────────────────────────────────────────
function renderWA() {
  const text = toWA(), has = Object.values(list).some(e => Number(e.qty) > 0);
  document.getElementById("wa-empty").style.display  = has ? "none"  : "block";
  document.getElementById("wa-filled").style.display = has ? "block" : "none";
  if (has) { const ta = document.getElementById("wa-text"); ta.value = text; ta.style.height = Math.min(600, 40 + text.split("\n").length * 28) + "px"; }

  // Price changes section
  const priceLines = [];
  Object.entries(picked).forEach(([key, p]) => {
    if (p.sellPrice && p.sellPriceChanged) {
      const parts = key.split("|||");
      const item = parts[1] || key;
      const price = parseFloat(p.sellPrice).toFixed(2).replace(".", ",");
      priceLines.push(`${item}  ${price}€`);
    }
  });
  const hasPrices = priceLines.length > 0;
  document.getElementById("wa-prices").style.display = hasPrices ? "block" : "none";
  if (hasPrices) {
    const ta = document.getElementById("wa-prices-text");
    ta.value = "*Actualizações de preço*\n\n" + priceLines.join("\n");
    ta.style.height = Math.min(400, 40 + priceLines.length * 30 + 60) + "px";
  }
}

function renderAdd() {
  const sel = document.getElementById("cat-select");
  sel.innerHTML = `<option value="">— escolher categoria —</option>` +

// ── RENDER MANAGE ─────────────────────────────────────────────────────────────
function renderManage() {
  const c = document.getElementById("manage-list"); if (!c) return; c.innerHTML = "";
  window._mO = window._mO || {};

  // Collapse/Expand all button
  const allOpen = Object.values(window._mO).every(v => v !== false);
  const toggleAll = document.createElement("div");
  toggleAll.style.cssText = "display:flex; gap:8px; margin-bottom:12px;";
  const btnExp = document.createElement("button");
  btnExp.textContent = "Expandir tudo";
  btnExp.style.cssText = "flex:1; padding:10px; background:var(--green-light); border:none; border-radius:8px; font-size:13px; font-weight:700; color:var(--green-dark); cursor:pointer; font-family:inherit;";
  btnExp.addEventListener("click", () => { Object.keys(products).forEach(k => { window._mO[k] = true; }); renderManage(); });
  const btnCol = document.createElement("button");
  btnCol.textContent = "Colapsar tudo";
  btnCol.style.cssText = "flex:1; padding:10px; background:#f5f5f5; border:none; border-radius:8px; font-size:13px; font-weight:700; color:#666; cursor:pointer; font-family:inherit;";
  btnCol.addEventListener("click", () => { Object.keys(products).forEach(k => { window._mO[k] = false; }); renderManage(); });
  toggleAll.appendChild(btnExp); toggleAll.appendChild(btnCol);
  c.appendChild(toggleAll);

  Object.entries(products).forEach(([cat, items]) => {
    const io = window._mO[cat] !== false;
    const block = document.createElement("div"); block.className = "manage-cat-block";
    const hd = document.createElement("div"); hd.className = "manage-cat-hdr";
    hd.innerHTML = `<span>${cat}</span><span>${io?"▾":"▸"}</span>`;
    hd.addEventListener("click", () => { window._mO[cat] = !io; renderManage(); });
    block.appendChild(hd);

    const bd = document.createElement("div"); bd.className = "manage-cat-body" + (io ? "" : " collapsed");

    if (subcats[cat]) {
      // ── SUBCATEGORY MANAGEMENT ──
      const addSubBtn = document.createElement("button"); addSubBtn.className = "btn-add-subcat";
      addSubBtn.textContent = "+ Nova subcategoria";
      addSubBtn.addEventListener("click", () => {
        const name = prompt("Nome da nova subcategoria:"); if (!name||!name.trim()) return;
        subcats[cat].push({ name: name.trim(), items: [] });
        sched(); renderManage();
      });
      bd.appendChild(addSubBtn);

      subcats[cat].forEach((group, gi) => {
        const gBlock = document.createElement("div"); gBlock.className = "manage-subcat-block";

        // Subcat header
        const gHdr = document.createElement("div"); gHdr.className = "manage-subcat-hdr";
        const gTitle = document.createElement("span"); gTitle.className = "manage-subcat-title"; gTitle.textContent = group.name;

        const btnRen = document.createElement("button"); btnRen.className = "btn-icon btn-edit"; btnRen.textContent = "✏️";
        btnRen.addEventListener("click", () => {
          const n = prompt("Novo nome:", group.name); if (!n||!n.trim()) return;
          subcats[cat][gi].name = n.trim(); sched(); renderManage();
        });

        const btnDel = document.createElement("button"); btnDel.className = "btn-icon btn-delete"; btnDel.textContent = "🗑️";
        btnDel.addEventListener("click", () => {
          if (!confirm(`Apagar subcategoria "${group.name}"?`)) return;
          subcats[cat].splice(gi, 1); sched(); renderManage(); renderCats("");
        });

        gHdr.appendChild(gTitle); gHdr.appendChild(btnRen); gHdr.appendChild(btnDel);
        gBlock.appendChild(gHdr);

        // Items
        group.items.forEach(item => {
          const row = document.createElement("div"); row.className = "manage-row";
          const nm = document.createElement("span"); nm.className = "manage-name"; nm.textContent = item;

          const bE = document.createElement("button"); bE.className = "btn-icon btn-edit"; bE.textContent = "✏️";
          bE.addEventListener("click", () => {
            const inp = document.createElement("input"); inp.className = "manage-edit-input"; inp.value = item;
            const bS = document.createElement("button"); bS.className = "btn-icon btn-save"; bS.textContent = "✓";
            const bC = document.createElement("button"); bC.className = "btn-icon btn-cancel-edit"; bC.textContent = "✕";
            row.innerHTML = ""; row.appendChild(inp); row.appendChild(bS); row.appendChild(bC); inp.focus(); inp.select();
            const doSave = () => {
              const n = inp.value.trim(); if (!n||n===item) { renderManage(); return; }
              const ix = products[cat].indexOf(item); if (ix !== -1) products[cat][ix] = n;
              const gix = subcats[cat][gi].items.indexOf(item); if (gix !== -1) subcats[cat][gi].items[gix] = n;
              const ok = gk(cat,item), nk = gk(cat,n); if (list[ok]) { list[nk]=list[ok]; delete list[ok]; }
              sched(); renderManage(); renderCats("");
              snack("✓ Guardado", "saved"); setTimeout(hideSnack, 1200);
            };
            bS.addEventListener("click", doSave); bC.addEventListener("click", () => renderManage());
            inp.addEventListener("keydown", e => { if(e.key==="Enter") doSave(); if(e.key==="Escape") renderManage(); });
          });

          const bM = document.createElement("button"); bM.className = "btn-icon btn-move"; bM.textContent = "↕️";
          bM.addEventListener("click", () => {
            const others = subcats[cat].filter((_, i) => i !== gi);
            if (!others.length) { alert("Não há outras subcategorias."); return; }
            const opts = others.map((g, i) => `${i+1}. ${g.name}`).join("\n");
            const choice = prompt(`Mover "${item}" para:\n${opts}\n\nEscreve o número:`);
            if (!choice) return;
            const n = parseInt(choice.trim(), 10) - 1;
            if (isNaN(n) || n < 0 || n >= others.length) return;
            const targetGroup = others[n];
            const targetGi = subcats[cat].indexOf(targetGroup);
            subcats[cat][gi].items = subcats[cat][gi].items.filter(i => i !== item);
            subcats[cat][targetGi].items.push(item);
            sched(); renderManage(); renderCats("");
          });

          const bD = document.createElement("button"); bD.className = "btn-icon btn-delete"; bD.textContent = "🗑️";
          bD.addEventListener("click", () => {
            if (!confirm(`Apagar "${item}"?`)) return;
            products[cat] = products[cat].filter(i => i !== item);
            subcats[cat][gi].items = subcats[cat][gi].items.filter(i => i !== item);
            delete list[gk(cat, item)];
            sched(); renderManage(); renderCats("");
          });

          row.appendChild(nm); row.appendChild(bE); row.appendChild(bM); row.appendChild(bD);
          gBlock.appendChild(row);
        });

        // Add item to subcat
        const addRow = document.createElement("div"); addRow.className = "manage-add-row";
        const addInp = document.createElement("input"); addInp.className = "manage-add-input"; addInp.placeholder = "+ Adicionar artigo...";
        addInp.addEventListener("keydown", e => {
          if (e.key !== "Enter") return;
          const n = addInp.value.trim(); if (!n) return;
          if (!products[cat].includes(n)) products[cat].push(n);
          subcats[cat][gi].items.push(n);
          list[gk(cat, n)] = { qty: 0 };
          sched(); addInp.value = ""; renderManage(); renderCats("");
        });
        addRow.appendChild(addInp); gBlock.appendChild(addRow);
        bd.appendChild(gBlock);
      });

    } else {
      // ── NORMAL CATEGORY MANAGEMENT ──
      items.forEach(item => {
        const row = document.createElement("div"); row.className = "manage-row";
        const nm = document.createElement("span"); nm.className = "manage-name"; nm.textContent = item;
        const bE = document.createElement("button"); bE.className = "btn-icon btn-edit"; bE.textContent = "✏️";
        const bD = document.createElement("button"); bD.className = "btn-icon btn-delete"; bD.textContent = "🗑️";
        bE.addEventListener("click", () => {
          const inp = document.createElement("input"); inp.className = "manage-edit-input"; inp.value = item;
          const bS = document.createElement("button"); bS.className = "btn-icon btn-save"; bS.textContent = "✓";
          const bC = document.createElement("button"); bC.className = "btn-icon btn-cancel-edit"; bC.textContent = "✕";
          row.innerHTML = ""; row.appendChild(inp); row.appendChild(bS); row.appendChild(bC); inp.focus(); inp.select();
          const ds = () => {
            const n = inp.value.trim(); if (!n||n===item) { renderManage(); return; }
            const ix = products[cat].indexOf(item); if (ix !== -1) products[cat][ix] = n;
            const ok = gk(cat,item), nk = gk(cat,n); if (list[ok]) { list[nk]=list[ok]; delete list[ok]; }
            sched(); renderManage(); renderCats("");
          };
          bS.addEventListener("click", ds); bC.addEventListener("click", () => renderManage());
          inp.addEventListener("keydown", e => { if(e.key==="Enter") ds(); if(e.key==="Escape") renderManage(); });
        });
        bD.addEventListener("click", () => {
          if (!confirm(`Apagar "${item}"?`)) return;
          products[cat] = products[cat].filter(i => i !== item);
          delete list[gk(cat, item)];
          sched(); renderManage(); renderCats("");
        });
        row.appendChild(nm); row.appendChild(bE); row.appendChild(bD); bd.appendChild(row);
      });
    }

    block.appendChild(bd); c.appendChild(block);
  });
}

// ── SNACK ─────────────────────────────────────────────────────────────────────

function hideSnack() { document.getElementById("snackbar").style.display="none"; }

// ── NAV ───────────────────────────────────────────────────────────────────────
function renderHistory() {
  const c = document.getElementById("history-content"); if (!c) return;
  c.innerHTML = "";

  if (!history.length) {
    c.innerHTML = '<div class="hist-empty">Ainda não há histórico.<br>Quando limpares a lista, fica aqui guardado.</div>';
    return;
  }

  // Toggle
  const toggle = document.createElement("div"); toggle.className = "hist-toggle";
  const btnWeek = document.createElement("button"); btnWeek.className = "hist-toggle-btn active"; btnWeek.textContent = "Por semana";
  const btnProd = document.createElement("button"); btnProd.className = "hist-toggle-btn"; btnProd.textContent = "Por produto";
  toggle.appendChild(btnWeek); toggle.appendChild(btnProd); c.appendChild(toggle);

  const weekView = document.createElement("div"); weekView.id = "hist-week-view";
  const prodView = document.createElement("div"); prodView.id = "hist-prod-view"; prodView.style.display = "none";
  c.appendChild(weekView); c.appendChild(prodView);

  btnWeek.addEventListener("click", () => { btnWeek.classList.add("active"); btnProd.classList.remove("active"); weekView.style.display="block"; prodView.style.display="none"; });
  btnProd.addEventListener("click", () => { btnProd.classList.add("active"); btnWeek.classList.remove("active"); prodView.style.display="block"; weekView.style.display="none"; });

  // BY WEEK
  history.forEach((snap, si) => {
    const block = document.createElement("div"); block.className = "hist-week";
    const hdr = document.createElement("div"); hdr.className = "hist-week-hdr";
    hdr.innerHTML = `<span class="hist-week-label">${snap.label}</span><span class="hist-week-count">${snap.items.length} artigos</span>`;
    const body = document.createElement("div"); body.className = "hist-week-body" + (si > 0 ? " collapsed" : "");
    hdr.addEventListener("click", () => body.classList.toggle("collapsed"));
    snap.items.forEach(it => {
      const row = document.createElement("div"); row.className = "hist-item";
      row.innerHTML = `<span class="hist-item-name">${it.item}</span><div class="hist-item-detail">${it.price ? it.price+"€/kg" : ""}${it.price && it.supplier ? "<br>" : ""}${it.supplier || ""}</div>`;
      body.appendChild(row);
    });
    block.appendChild(hdr); block.appendChild(body); weekView.appendChild(block);
  });

  // BY PRODUCT
  const byProduct = {};
  history.forEach(snap => {
    snap.items.forEach(it => {
      if (!byProduct[it.item]) byProduct[it.item] = [];
      byProduct[it.item].push({ date: snap.label, price: it.price, supplier: it.supplier });
    });
  });
  Object.entries(byProduct).sort((a,b) => a[0].localeCompare(b[0])).forEach(([name, entries], pi) => {
    const block = document.createElement("div"); block.className = "hist-product";
    const hdr = document.createElement("div"); hdr.className = "hist-product-hdr";
    hdr.innerHTML = `<span class="hist-product-name">${name}</span><span class="hist-week-count">${entries.length}x</span>`;
    const body = document.createElement("div"); body.className = "hist-product-body" + (pi > 0 ? " collapsed" : "");
    hdr.addEventListener("click", () => body.classList.toggle("collapsed"));
    entries.forEach(e => {
      const row = document.createElement("div"); row.className = "hist-price-row";
      row.innerHTML = `<span class="hist-price-date">${e.date}</span><span class="hist-price-val">${e.price ? e.price+"€/kg" : "—"}</span><span class="hist-price-sup">${e.supplier||""}</span>`;
      body.appendChild(row);
    });
    block.appendChild(hdr); block.appendChild(body); prodView.appendChild(block);
  });
}

function switchTo(v) {
  document.querySelectorAll(".hnav-btn").forEach(x => x.classList.toggle("active", x.dataset.view===v));
  document.querySelectorAll(".view").forEach(el => el.classList.toggle("active", el.id===`view-${v}`));
  if (v==="whatsapp") renderWA();
  if (v==="add") renderAdd();
  if (v==="history") renderHistory();
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.querySelectorAll(".hnav-btn").forEach(b => b.addEventListener("click", () => switchTo(b.dataset.view)));
document.getElementById("clear-btn").addEventListener("click", () => {
  if (!confirm("Limpar lista e guardar histórico?")) return;
  // Save snapshot
  const snapshot = {
    date: new Date().toISOString().split('T')[0],
    label: new Date().toLocaleDateString('pt-PT', { day:'2-digit', month:'short', year:'numeric' }),
    items: []
  };
  Object.entries(list).forEach(([key, e]) => {
    if (Number(e.qty) > 0) {
      const p = picked[key] || {};
      const [cat, item] = key.split('|||');
      snapshot.items.push({ cat, item, qty: e.qty, price: p.price||'', supplier: p.supplier||'', date: p.date||'' });
    }
  });
  if (snapshot.items.length > 0) history.unshift(snapshot);
  if (history.length > 52) history = history.slice(0, 52); // keep 1 year
  Object.keys(list).forEach(k => { list[k] = { qty: 0 }; });
  picked = {};
  sched(); renderCats(""); renderWA();
});
document.getElementById("cat-select").addEventListener("change", e => {
  const cat = e.target.value;
  document.getElementById("new-cat-wrap").style.display = cat === "__nova__" ? "block" : "none";
  const sw = document.getElementById("subcat-select-wrap");
  const ss = document.getElementById("subcat-select");
  if (subcats[cat]) {
    ss.innerHTML = subcats[cat].map((g,i) => `<option value="${i}">${g.name}</option>`).join("");
    sw.style.display = "block";
  } else { sw.style.display = "none"; }
});
document.getElementById("add-btn").addEventListener("click", () => {
  let cat = document.getElementById("cat-select").value;
  const item = document.getElementById("new-item-input").value.trim();
  if (cat === "__nova__") cat = document.getElementById("new-cat-input").value.trim();
  if (!cat || !item) return;
  if (!products[cat]) products[cat] = [];
  if (!products[cat].includes(item)) products[cat].push(item);
  // Add to subcat if applicable
  if (subcats[cat]) {
    const gi = parseInt(document.getElementById("subcat-select").value, 10);
    if (!isNaN(gi) && subcats[cat][gi]) subcats[cat][gi].items.push(item);
  }
  list[gk(cat, item)] = { qty: 0 };
  openCats[cat] = true;
  sched();
  document.getElementById("new-item-input").value = "";
  switchTo("list"); renderCats("");
});
document.getElementById("cancel-btn").addEventListener("click", () => switchTo("list"));
document.getElementById("wa-text").addEventListener("focus", e => e.target.select());
document.getElementById("wa-prices-text").addEventListener("focus", e => e.target.select());

// ── LONG PRESS ───────────────────────────────────────────────────────────────
function addLongPress(el, cb) {
  let timer = null;
  el.addEventListener("touchstart", e => {
    timer = setTimeout(() => { cb(); timer = null; }, 600);
  }, { passive: true });
  el.addEventListener("touchend", () => { if (timer) clearTimeout(timer); });
  el.addEventListener("touchmove", () => { if (timer) clearTimeout(timer); });
}

// ── PICK PANEL ────────────────────────────────────────────────────────────────
let currentPickKey = null;

function buildSupplierOptions() {
  const sel = document.getElementById("pick-supplier");
  sel.innerHTML = '<option value="">— escolher fornecedor —</option>';
  Object.entries(FORNECEDORES).forEach(([corridor, suppliers]) => {
    const grp = document.createElement("optgroup");
    grp.label = corridor;
    suppliers.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });
  // Custom option
  const grp2 = document.createElement("optgroup");
  grp2.label = "Outro";
  const opt2 = document.createElement("option");
  opt2.value = "__novo__"; opt2.textContent = "+ Novo fornecedor...";
  grp2.appendChild(opt2);
  sel.appendChild(grp2);
}

function openPickPanel(cat, item) {
  const key = gk(cat, item);
  currentPickKey = key;
  const p = picked[key] || {};
  document.getElementById("pick-title").textContent = item;
  document.getElementById("pick-price").value = p.price || "";
  const sellEl = document.getElementById("pick-sell-price"); if(sellEl) sellEl.value = p.sellPrice || "";
  buildSupplierOptions();
  document.getElementById("pick-supplier").value = p.supplier || "";
  const today = new Date().toISOString().split('T')[0];
  const dateEl = document.getElementById("pick-date"); if(dateEl) dateEl.value = p.date || today;
  document.getElementById("pick-panel").classList.add("open");
  document.getElementById("pick-overlay").classList.add("open");
}

function closePickPanel() {
  document.getElementById("pick-panel").classList.remove("open");
  document.getElementById("pick-overlay").classList.remove("open");
  currentPickKey = null;
}

document.getElementById("pick-price").addEventListener("input", e => {
  if (!currentPickKey) return;
  picked[currentPickKey] = { ...picked[currentPickKey], price: e.target.value };
  sched();
});

document.getElementById("pick-sell-price").addEventListener("input", e => {
  if (!currentPickKey) return;
  const newSellPrice = e.target.value;
  const oldSellPrice = picked[currentPickKey]?.sellPrice || "";
  const changed = newSellPrice !== oldSellPrice && newSellPrice !== "";
  picked[currentPickKey] = { ...picked[currentPickKey], sellPrice: newSellPrice, sellPriceChanged: changed };
  sched();
  renderWA();
});

document.getElementById("pick-supplier").addEventListener("change", e => {
  if (!currentPickKey) return;
  if (e.target.value === "__novo__") {
    const name = prompt("Nome do novo fornecedor:");
    if (!name || !name.trim()) { e.target.value = picked[currentPickKey]?.supplier || ""; return; }
    // Add to A5 by default
    FORNECEDORES["A5"].push(name.trim());
    picked[currentPickKey] = { ...picked[currentPickKey], supplier: name.trim() };
    buildSupplierOptions();
    document.getElementById("pick-supplier").value = name.trim();
  } else {
    picked[currentPickKey] = { ...picked[currentPickKey], supplier: e.target.value };
  }
  sched();
});

document.getElementById("pick-date").addEventListener("change", e => {
  if (!currentPickKey) return;
  picked[currentPickKey] = { ...picked[currentPickKey], date: e.target.value };
  sched();
});

document.getElementById("pick-close").addEventListener("click", closePickPanel);
document.getElementById("pick-overlay").addEventListener("click", closePickPanel);

// ── START ─────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
