<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#2a2a2a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Momento Frutado"/>
  <title>Momento Frutado – Compras</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #eeeeee;
      --green: #7CA37C;
      --green-dark: #5a7a5a;
      --green-light: #e8f5e9;
      --text: #1a1a1a;
      --text-mid: #424242;
      --text-dim: #9e9e9e;
      --border: #e0e0e0;
      --error: #c62828;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; font-family: inherit; cursor: pointer; }
    textarea { -webkit-user-select: text; user-select: text; }

    /* LOADING */
    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:14px; background:#f5f5f5; }
    .ld-title { font-size:22px; font-weight:800; color:var(--green); }
    .ld-sub { font-size:12px; color:var(--text-dim); }

    /* SHELL */
    #app { max-width:600px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }

    /* HEADER */
    #header { background:#2a2a2a; padding:10px 18px 0; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
    #header-nav { display:flex; align-items:center; justify-content:space-between; padding:10px 0 12px; }
    #header-brand { font-size:16px; font-weight:600; color:#888; letter-spacing:0.3px; text-transform:uppercase; }
    #header-icons { display:flex; gap:8px; }
    .hnav-btn { border:none; background:transparent; color:#888; padding:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:8px; }
    .hnav-btn .material-icons-round { font-size:22px; }
    .hnav-btn.active { color:var(--green); }



    /* SCROLL */
    #scroll-area { flex:1; overflow-y:auto; padding-bottom:16px; }
    .view { display:none; }
    .view.active { display:block; }

    /* SEARCH */

    /* CATEGORY */
    .cat-wrap { padding:10px 14px 0; }
    .cat-header { display:flex; align-items:center; justify-content:space-between; padding:7px 10px; cursor:pointer; user-select:none; background:var(--green); border-radius:8px; margin-bottom:4px; }
    .cat-name { font-size:11px; font-weight:700; color:#ffffff; text-transform:uppercase; letter-spacing:1.5px; }
    .cat-chevron { font-size:14px; color:#ffffff; transition:transform 0.2s; }
    .cat-chevron.closed { transform:rotate(-90deg); }
    .cat-body.collapsed { display:none; }
    .cat-body { background:#ffffff; }

    /* SUBCAT SPACER */
    .subcat-spacer { height:70px; display:block; background:#f5f5f5; margin:0; border-radius:0; }

    /* ITEM ROWS */
    .item-row { display:flex; align-items:center; gap:16px; padding:10px 4px; border-bottom:none; border-radius:8px; }
    .item-row.zebra-even { background:#e8f5e9; }
    .item-row.zebra-odd  { background:#ffffff; }
    .item-row.active { }
    .item-name { flex:1; font-size:25px; font-weight:400; color:var(--text-mid); line-height:1.2; }
    .item-name.active { font-weight:800; color:var(--text); font-size:27px; }

    /* QTY */
    .qty-wrap { display:flex; align-items:center; }
    .qty-display { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:400; color:#1a1a1a; background:#e8f5e9; border:none; cursor:pointer; transition:all 0.2s; }
    .qty-display.active { background:#c8e6c9; color:#1a1a1a; box-shadow: 0 2px 8px rgba(124,163,124,0.3); }
    .qty-input-inline { width:48px; height:48px; text-align:center; font-size:22px; font-weight:400; border:2px solid var(--green); border-radius:50%; color:#1a1a1a; background:#c8e6c9; font-family:inherit; outline:none; }

    /* CLEAR */
    #clear-wrap { padding:16px 18px 0; }
    #clear-btn { width:100%; padding:12px; background:transparent; border:1px solid #ffcdd2; border-radius:10px; color:var(--error); font-size:14px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:7px; }

    /* WHATSAPP */
    #wa-content { padding:16px 14px; }
    #wa-empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
    #wa-empty .wa-icon { font-size:52px; margin-bottom:12px; }
    #wa-empty .wa-title { font-size:17px; font-weight:700; color:var(--text-mid); }
    #wa-empty .wa-sub { font-size:14px; margin-top:6px; }
    #wa-hint { background:var(--green-light); border-radius:12px; padding:13px 15px; margin-bottom:12px; font-size:14px; color:var(--green-dark); font-weight:600; line-height:1.5; border-left:4px solid var(--green); }
    #wa-text { width:100%; padding:14px; border-radius:12px; border:1px solid var(--border); font-size:15px; line-height:2; font-family:monospace; color:var(--text); background:var(--surface); resize:none; outline:none; }
    #wa-text:focus { border-color:var(--green); }

    /* ADD/MANAGE */
    #add-content { padding:14px; }
    .form-card { background:var(--surface); border-radius:14px; padding:18px; border:1px solid var(--border); margin-bottom:14px; }
    .form-card-title { font-size:15px; font-weight:800; color:var(--text); margin-bottom:16px; }
    .form-label { font-size:11px; font-weight:700; color:var(--text-dim); margin-bottom:5px; display:block; text-transform:uppercase; letter-spacing:0.5px; }
    .md-input, .md-select { width:100%; padding:12px 13px; border-radius:10px; border:1px solid var(--border); font-size:16px; margin-bottom:12px; font-family:inherit; outline:none; background:#fff; color:var(--text); transition:border-color 0.15s; }
    .md-input:focus, .md-select:focus { border-color:var(--green); }
    .btn-primary { width:100%; padding:14px; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; margin-bottom:8px; }
    .btn-secondary { width:100%; padding:12px; background:var(--green-light); color:var(--green-dark); border:none; border-radius:10px; font-size:15px; font-weight:600; }

    /* MANAGE */
    .manage-cat-block { background:var(--surface); border-radius:12px; border:1px solid var(--border); overflow:hidden; margin-bottom:10px; }
    .manage-cat-hdr { padding:11px 14px; background:var(--surface2); display:flex; justify-content:space-between; align-items:center; cursor:pointer; border-bottom:1px solid var(--border); }
    .manage-cat-hdr span { font-size:11px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.5px; }
    .manage-cat-body.collapsed { display:none; }
    .manage-subcat-block { background:#fafafa; border-radius:10px; margin:8px; border:1px solid var(--border); overflow:hidden; }
    .manage-subcat-hdr { display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--surface2); border-bottom:1px solid var(--border); }
    .manage-subcat-title { flex:1; font-size:12px; font-weight:700; color:#424242; text-transform:uppercase; letter-spacing:0.5px; }
    .manage-row { display:flex; align-items:center; gap:8px; padding:11px 14px; border-top:1px solid #f0f0f0; }
    .manage-name { flex:1; font-size:17px; font-weight:500; color:var(--text); }
    .manage-edit-input { flex:1; font-size:17px; border:1.5px solid var(--green); border-radius:8px; padding:6px 10px; font-family:inherit; outline:none; background:#fff; }
    .manage-add-row { padding:8px 12px; }
    .manage-add-input { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:8px; font-size:15px; font-family:inherit; outline:none; background:#fff; }
    .manage-add-input:focus { border-color:var(--green); }
    .btn-add-subcat { width:calc(100% - 16px); margin:8px; padding:10px; background:var(--green-light); border:none; border-radius:8px; font-size:14px; font-weight:700; color:var(--green-dark); }
    .btn-icon { width:36px; height:36px; border:none; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:15px; background:transparent; }
    .btn-edit { color:#1565c0; }
    .btn-move { color:var(--green); }
    .btn-delete { color:var(--error); }
    .btn-save { color:var(--green); }
    .btn-cancel-edit { color:var(--text-dim); }



    /* SNACK */
    #snackbar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); border-radius:8px; padding:9px 18px; font-size:13px; font-weight:600; box-shadow:0 3px 12px rgba(0,0,0,0.18); z-index:300; display:none; color:#fff; white-space:nowrap; }
    #snackbar.saving { background:#f57f17; }
    #snackbar.saved  { background:var(--green); }
    #snackbar.error  { background:var(--error); }
  </style>
</head>
<body>

<div id="loading">
  <div class="ld-title">Momento Frutado</div>
  <div class="ld-sub">A carregar...</div>
</div>

<div id="app" style="display:none">
  <div id="header">

    <div id="header-nav">
      <div id="header-brand">Momento Frutado</div>
      <div id="header-icons">
        <button class="hnav-btn active" data-view="list"><span class="material-icons-round">format_list_bulleted</span></button>
        <button class="hnav-btn" data-view="whatsapp"><span class="material-icons-round">chat_bubble_outline</span></button>
        <button class="hnav-btn" data-view="add"><span class="material-icons-round">tune</span></button>
      </div>
    </div>



  </div>

  <div id="scroll-area">
    <div id="view-list" class="view active">

      <div id="cat-list"></div>
      <div id="clear-wrap"><button id="clear-btn">Limpar lista</button></div>
    </div>

    <div id="view-whatsapp" class="view">
      <div id="wa-content">
        <div id="wa-empty">
          <div class="wa-icon">📋</div>
          <div class="wa-title">Lista ainda vazia</div>
          <div class="wa-sub">Vai à lista e insere as quantidades</div>
        </div>
        <div id="wa-filled" style="display:none">
          <div id="wa-hint">Mantém o dedo no texto → <strong>Seleccionar tudo</strong> → <strong>Copiar</strong></div>
          <textarea id="wa-text" readonly></textarea>
        </div>
      </div>
    </div>

    <div id="view-add" class="view">
      <div id="add-content">
        <div class="form-card">
          <div class="form-card-title">Adicionar produto</div>
          <label class="form-label">Categoria</label>
          <select id="cat-select" class="md-select"></select>
          <div id="subcat-select-wrap" style="display:none">
            <label class="form-label">Subcategoria</label>
            <select id="subcat-select" class="md-select"></select>
          </div>
          <div id="new-cat-wrap" style="display:none">
            <label class="form-label">Nova categoria</label>
            <input id="new-cat-input" class="md-input" placeholder="Ex: 🌿 Ervas aromáticas"/>
          </div>
          <label class="form-label">Nome do produto</label>
          <input id="new-item-input" class="md-input" placeholder="Ex: Manga Tommy"/>
          <button id="add-btn" class="btn-primary">Adicionar produto</button>
          <button id="cancel-btn" class="btn-secondary">Cancelar</button>
        </div>
        <div class="form-card">
          <div class="form-card-title">Gerir produtos existentes</div>
          <div id="manage-list"></div>
        </div>
      </div>
    </div>
  </div>


</div>

<div id="snackbar"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const LS_CACHE = "mf_cache_v16";
const CLOSED_BY_DEFAULT = ["Azeitonas","Frutos secos","Consumíveis"];

// ── DATA ──────────────────────────────────────────────────────────────────────
const DEFAULT_PRODUCTS = {
  "Fruta": [
    "Abacaxi","Uva Red Globe","Uva sem grainha","Mamão","Manga","Papaia","Abacate","Kiwi Gold",
    "Meloa","Melão branco","Melão verde","Melancia",
    "Pera Rocha","Maçã Gala","Maçã Gold","Maçã Reineta","Pêra Conferência","Pera William","Pera Red","Maçã Granny","Maçã Fuji","Maçã Pink Lady","Kiwi",
    "Banana","Banana Madeira",
    "Laranja","Clementina",
    "Pêssego amarelo","Pêssego rosa","Pêssego vermelho","Paraguaio","Nectarina","Alperce","Ameixa vermelha","Ameixa amarela",
    "Cereja (cx 2kg)","Morangos","Pitaia","Mirtilos","Framboesa",
    "Mini Gold","Mini Gala","Mini Reineta"
  ],
  "Legumes": [
    "Tomate","Tomate cacho","Tomate Xuxa","Tomate rosa","Tomate cherry",
    "Pepino","Pimento verde","Pimento vermelho","Courgette","Beringela","Feijão verde","Feijão douradinho",
    "Batata roxa","Batata agria","Batata assar","Batata olho perdiz",
    "Cebola","Cebola nova","Cebola doce","Cebola roxa","Cebola mini","Chalota",
    "Cogumelo branco","Cogumelo marrom","Cogumelo Shitake","Cogumelo Eringi",
    "Espargos","Quiabos","Malagueta"
  ],
  "Azeitonas": ["Mista Ablu","Mista Edgar","Galega","Britada","Preta","Tremoços"],
  "Frutos secos": [
    "Bolachas amendoim","Pinhão","Caju cru","Caju com sal","Caju sem sal",
    "Amendoim com sal","Amendoim sem sal","Pistácio","Amêndoa miolo","Amêndoa sem pele",
    "Amêndoa torrada","Amêndoa palitada","Amêndoa laminada","Avelã","Nozes miolo","Fruta italiana",
    "Tâmara Medjool","Tâmara barata","Figos","Figos turcos","Favas","Arandos",
    "Sultana branca miúda","Sultana preta miúda","Sultana XL","Ameixa seca","Alperce seco"
  ],
  "Consumíveis": [
    "Filme","Saco 30×40 HD rolo (normais)","Saco 20×30×3 rolo (frutos secos)",
    "Saco 40×60 HD rolo (horta)","Covetes 1kg","Covetes 500gr",
    "Saco 30×40×3 LB solto (melão)","Saco 40×60 LD rolo (melancia)","Fita cola"
  ]
};

const DEFAULT_SUBCATS = {
  "Legumes": [
    { name: "Tomate", items: ["Tomate","Tomate cacho","Tomate Xuxa","Tomate rosa","Tomate cherry","Pepino","Pimento verde","Pimento vermelho","Courgette","Beringela","Feijão verde","Feijão douradinho"] },
    { name: "Batata", items: ["Batata roxa","Batata agria","Batata assar","Batata olho perdiz"] },
    { name: "Cebola", items: ["Cebola","Cebola nova","Cebola doce","Cebola roxa","Cebola mini","Chalota"] },
    { name: "Cogumelo", items: ["Cogumelo branco","Cogumelo marrom","Cogumelo Shitake","Cogumelo Eringi","Espargos","Quiabos","Malagueta"] }
  ],
  "Fruta": [
    { name: "Tropical",        items: ["Abacaxi","Uva Red Globe","Uva sem grainha","Mamão","Manga","Papaia","Abacate","Kiwi Gold"] },
    { name: "Melões",          items: ["Meloa","Melão branco","Melão verde","Melancia"] },
    { name: "Maçãs e Peras",   items: ["Pera Rocha","Maçã Gala","Maçã Gold","Maçã Reineta","Pêra Conferência","Pera William","Pera Red","Maçã Granny","Maçã Fuji","Maçã Pink Lady","Kiwi"] },
    { name: "Banana",          items: ["Banana","Banana Madeira"] },
    { name: "Citrinos",        items: ["Laranja","Clementina"] },
    { name: "Prunóideas",      items: ["Pêssego amarelo","Pêssego rosa","Pêssego vermelho","Paraguaio","Nectarina","Alperce","Ameixa vermelha","Ameixa amarela"] },
    { name: "Frutos vermelhos",items: ["Cereja (cx 2kg)","Morangos","Pitaia","Mirtilos","Framboesa"] },
    { name: "Mini",            items: ["Mini Gold","Mini Gala","Mini Reineta","Mini Reineta"] }
  ]
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
let subcats  = JSON.parse(JSON.stringify(DEFAULT_SUBCATS));
let list     = {};
let openCats = {};
let saveTimer = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function gk(cat, item) { return `${cat}|||${item}`; }

function buildEmpty(prods) {
  const out = {};
  Object.entries(prods).forEach(([cat, items]) =>
    items.forEach(item => { out[gk(cat, item)] = { qty: 0 }; })
  );
  return out;
}

function initOpen(prods) {
  Object.keys(prods).forEach(c => {
    if (openCats[c] === undefined) openCats[c] = !CLOSED_BY_DEFAULT.includes(c);
  });
}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
function payload() { return { products, subcats, list }; }

function applyLocal(r) {
  if (r.products) products = r.products;
  subcats = JSON.parse(JSON.stringify(DEFAULT_SUBCATS));
  if (r.list) list = { ...buildEmpty(products), ...r.list };
  else        list = buildEmpty(products);
  initOpen(products);
}

function sched() {
  localStorage.setItem(LS_CACHE, JSON.stringify(payload()));
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const n = new Date();
    document.getElementById("sync-label").textContent = `Guardado ${pad(n.getHours())}:${pad(n.getMinutes())}`;
  }, 300);
}

function boot() {
  const cached = localStorage.getItem(LS_CACHE);
  if (cached) {
    try { applyLocal(JSON.parse(cached)); }
    catch { list = buildEmpty(products); initOpen(products); }
  } else {
    list = buildEmpty(products); initOpen(products);
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.cssText = "display:flex;flex-direction:column;";
  renderCats("");
}

// ── WHATSAPP ──────────────────────────────────────────────────────────────────
function toWA() {
  const lines = [];
  Object.entries(products).forEach(([cat, items]) => {
    // Collect rows grouped by subcat if applicable
    let catRows = [];
    if (subcats[cat]) {
      subcats[cat].forEach((group, gi) => {
        const groupRows = group.items
          .map(item => ({ item, qty: Number(list[gk(cat, item)]?.qty || 0) }))
          .filter(e => e.qty > 0)
          .map(e => `${e.qty} ${e.item.toLowerCase()}`);
        if (groupRows.length) {
          if (catRows.length) catRows.push("", ""); // 2 blank lines between subcats
          catRows.push(...groupRows);
        }
      });
    } else {
      items.forEach((item, idx) => {
        const qty = Number(list[gk(cat, item)]?.qty || 0);
        if (qty) { catRows.push(`${qty} ${item.toLowerCase()}`); catRows.push(""); }
      });
      if (catRows.length && catRows[catRows.length-1]==="") catRows.pop();
    }
    if (catRows.length) {
      if (lines.length) lines.push("", "", ""); // 3 blank lines between categories
      const label = cat.replace(/^[\p{Emoji}\s]+/u, "").trim();
      lines.push(`*${label}*`, "");
      lines.push(...catRows);
    }
  });
  return lines.join("\n").trim();
}

// ── RENDER HEADER ─────────────────────────────────────────────────────────────
function pad(n) { return n.toString().padStart(2, "0"); }

function renderHdr() {
  const total  = Object.keys(list).length;
  const filled = Object.values(list).filter(e => Number(e.qty) > 0).length;
  document.getElementById("progress-pill").textContent = `${filled}/${total}`;
  document.getElementById("progress-fill").style.width = total ? `${(filled/total)*100}%` : "0%";
}

// ── RENDER CATS ───────────────────────────────────────────────────────────────
function renderCats(search) {
  const c = document.getElementById("cat-list"); c.innerHTML = "";
  Object.entries(products).forEach(([cat, items]) => {
    const open = openCats[cat] !== false;
    const wrap = document.createElement("div"); wrap.className = "cat-wrap";

    const hdr = document.createElement("div"); hdr.className = "cat-header";
    hdr.innerHTML = `<span class="cat-name">${cat}</span><span class="cat-chevron ${open?"":"closed"}">▾</span>`;
    hdr.addEventListener("click", () => { openCats[cat] = !open; renderCats(""); });
    wrap.appendChild(hdr);

    const body = document.createElement("div"); body.className = "cat-body" + (open ? "" : " collapsed");

    if (subcats[cat]) {
      // Render with subcategory spacers
      subcats[cat].forEach((group, gi) => {
        const gItems = search ? group.items.filter(i => i.toLowerCase().includes(search.toLowerCase())) : group.items;
        if (!gItems.length) return;
        if (gi > 0) { const sp = document.createElement("div"); sp.className = "subcat-spacer"; body.appendChild(sp); }
        gItems.forEach((item, idx) => {
          const key = gk(cat, item), e = list[key] || { qty: 0 }, active = Number(e.qty) > 0;
          const row = document.createElement("div");
          row.className = "item-row " + (idx % 2 === 0 ? "zebra-even" : "zebra-odd") + (active ? " active" : "");
          const nm = document.createElement("span"); nm.className = "item-name" + (active ? " active" : ""); nm.textContent = item;
          row.appendChild(nm); row.appendChild(makeQty(key, Number(e.qty))); body.appendChild(row);
        });
      });
    } else {
      const filtered = search ? items.filter(i => i.toLowerCase().includes(search.toLowerCase())) : items;
      filtered.forEach((item, idx) => {
        const key = gk(cat, item), e = list[key] || { qty: 0 }, active = Number(e.qty) > 0;
        const row = document.createElement("div");
        row.className = "item-row " + (idx % 2 === 0 ? "zebra-even" : "zebra-odd") + (active ? " active" : "");
        const nm = document.createElement("span"); nm.className = "item-name" + (active ? " active" : ""); nm.textContent = item;
        row.appendChild(nm); row.appendChild(makeQty(key, Number(e.qty))); body.appendChild(row);
      });
    }

    wrap.appendChild(body); c.appendChild(wrap);
  });
  renderHdr();
}

// ── QTY CONTROL ───────────────────────────────────────────────────────────────
function makeQty(key, qty) {
  const wrap = document.createElement("div"); wrap.className = "qty-wrap";
  const rr = () => { renderCats(""); renderWA(); };

  const display = document.createElement("div"); display.className = "qty-display" + (qty > 0 ? " active" : ""); display.textContent = qty > 0 ? qty : "—";
  display.addEventListener("click", () => {
    const inp = document.createElement("input"); inp.type = "number"; inp.inputMode = "numeric"; inp.pattern = "[0-9]*"; inp.className = "qty-input-inline"; inp.value = qty > 0 ? qty : "";
    wrap.replaceChild(inp, display); inp.focus(); inp.select();
    const commit = () => { const n = parseInt(inp.value, 10); list[key] = { qty: isNaN(n)||n<0?0:Math.min(999,n) }; sched(); rr(); };
    inp.addEventListener("blur", commit); inp.addEventListener("keydown", e => { if (e.key==="Enter") inp.blur(); });
  });

  wrap.appendChild(display);
  return wrap;
}

// ── RENDER WHATSAPP ───────────────────────────────────────────────────────────
function renderWA() {
  const text = toWA(), has = Object.values(list).some(e => Number(e.qty) > 0);
  document.getElementById("wa-empty").style.display  = has ? "none"  : "block";
  document.getElementById("wa-filled").style.display = has ? "block" : "none";
  if (has) { const ta = document.getElementById("wa-text"); ta.value = text; ta.style.height = Math.min(600, 40 + text.split("\n").length * 28) + "px"; }
}

// ── RENDER ADD ────────────────────────────────────────────────────────────────
function renderAdd() {
  const sel = document.getElementById("cat-select");
  sel.innerHTML = `<option value="">— escolher categoria —</option>` +
    Object.keys(products).map(c => `<option value="${c}">${c}</option>`).join("") +
    `<option value="__nova__">+ Nova categoria...</option>`;
  document.getElementById("subcat-select-wrap").style.display = "none";
  document.getElementById("new-cat-wrap").style.display = "none";
  renderManage();
}

// ── RENDER MANAGE ─────────────────────────────────────────────────────────────
function renderManage() {
  const c = document.getElementById("manage-list"); if (!c) return; c.innerHTML = "";
  window._mO = window._mO || {};

  Object.entries(products).forEach(([cat, items]) => {
    const io = window._mO[cat] !== false;
    const block = document.createElement("div"); block.className = "manage-cat-block";
    const hd = document.createElement("div"); hd.className = "manage-cat-hdr";
    hd.innerHTML = `<span>${cat}</span><span>${io?"▾":"▸"}</span>`;
    hd.addEventListener("click", () => { window._mO[cat] = !io; renderManage(); });
    block.appendChild(hd);

    const bd = document.createElement("div"); bd.className = "manage-cat-body" + (io ? "" : " collapsed");

    if (subcats[cat]) {
      // ── SUBCATEGORY MANAGEMENT ──
      const addSubBtn = document.createElement("button"); addSubBtn.className = "btn-add-subcat";
      addSubBtn.textContent = "+ Nova subcategoria";
      addSubBtn.addEventListener("click", () => {
        const name = prompt("Nome da nova subcategoria:"); if (!name||!name.trim()) return;
        subcats[cat].push({ name: name.trim(), items: [] });
        sched(); renderManage();
      });
      bd.appendChild(addSubBtn);

      subcats[cat].forEach((group, gi) => {
        const gBlock = document.createElement("div"); gBlock.className = "manage-subcat-block";

        // Subcat header
        const gHdr = document.createElement("div"); gHdr.className = "manage-subcat-hdr";
        const gTitle = document.createElement("span"); gTitle.className = "manage-subcat-title"; gTitle.textContent = group.name;

        const btnRen = document.createElement("button"); btnRen.className = "btn-icon btn-edit"; btnRen.textContent = "✏️";
        btnRen.addEventListener("click", () => {
          const n = prompt("Novo nome:", group.name); if (!n||!n.trim()) return;
          subcats[cat][gi].name = n.trim(); sched(); renderManage();
        });

        const btnDel = document.createElement("button"); btnDel.className = "btn-icon btn-delete"; btnDel.textContent = "🗑️";
        btnDel.addEventListener("click", () => {
          if (!confirm(`Apagar subcategoria "${group.name}"?`)) return;
          subcats[cat].splice(gi, 1); sched(); renderManage(); renderCats("");
        });

        gHdr.appendChild(gTitle); gHdr.appendChild(btnRen); gHdr.appendChild(btnDel);
        gBlock.appendChild(gHdr);

        // Items
        group.items.forEach(item => {
          const row = document.createElement("div"); row.className = "manage-row";
          const nm = document.createElement("span"); nm.className = "manage-name"; nm.textContent = item;

          const bE = document.createElement("button"); bE.className = "btn-icon btn-edit"; bE.textContent = "✏️";
          bE.addEventListener("click", () => {
            const inp = document.createElement("input"); inp.className = "manage-edit-input"; inp.value = item;
            const bS = document.createElement("button"); bS.className = "btn-icon btn-save"; bS.textContent = "✓";
            const bC = document.createElement("button"); bC.className = "btn-icon btn-cancel-edit"; bC.textContent = "✕";
            row.innerHTML = ""; row.appendChild(inp); row.appendChild(bS); row.appendChild(bC); inp.focus(); inp.select();
            const doSave = () => {
              const n = inp.value.trim(); if (!n||n===item) { renderManage(); return; }
              const ix = products[cat].indexOf(item); if (ix !== -1) products[cat][ix] = n;
              const gix = subcats[cat][gi].items.indexOf(item); if (gix !== -1) subcats[cat][gi].items[gix] = n;
              const ok = gk(cat,item), nk = gk(cat,n); if (list[ok]) { list[nk]=list[ok]; delete list[ok]; }
              sched(); renderManage(); renderCats("");
            };
            bS.addEventListener("click", doSave); bC.addEventListener("click", () => renderManage());
            inp.addEventListener("keydown", e => { if(e.key==="Enter") doSave(); if(e.key==="Escape") renderManage(); });
          });

          const bM = document.createElement("button"); bM.className = "btn-icon btn-move"; bM.textContent = "↕️";
          bM.addEventListener("click", () => {
            const others = subcats[cat].filter((_, i) => i !== gi);
            if (!others.length) { alert("Não há outras subcategorias."); return; }
            const opts = others.map((g, i) => `${i+1}. ${g.name}`).join("\n");
            const choice = prompt(`Mover "${item}" para:\n${opts}\n\nEscreve o número:`);
            if (!choice) return;
            const n = parseInt(choice.trim(), 10) - 1;
            if (isNaN(n) || n < 0 || n >= others.length) return;
            const targetGroup = others[n];
            const targetGi = subcats[cat].indexOf(targetGroup);
            subcats[cat][gi].items = subcats[cat][gi].items.filter(i => i !== item);
            subcats[cat][targetGi].items.push(item);
            sched(); renderManage(); renderCats("");
          });

          const bD = document.createElement("button"); bD.className = "btn-icon btn-delete"; bD.textContent = "🗑️";
          bD.addEventListener("click", () => {
            if (!confirm(`Apagar "${item}"?`)) return;
            products[cat] = products[cat].filter(i => i !== item);
            subcats[cat][gi].items = subcats[cat][gi].items.filter(i => i !== item);
            delete list[gk(cat, item)];
            sched(); renderManage(); renderCats("");
          });

          row.appendChild(nm); row.appendChild(bE); row.appendChild(bM); row.appendChild(bD);
          gBlock.appendChild(row);
        });

        // Add item to subcat
        const addRow = document.createElement("div"); addRow.className = "manage-add-row";
        const addInp = document.createElement("input"); addInp.className = "manage-add-input"; addInp.placeholder = "+ Adicionar artigo...";
        addInp.addEventListener("keydown", e => {
          if (e.key !== "Enter") return;
          const n = addInp.value.trim(); if (!n) return;
          if (!products[cat].includes(n)) products[cat].push(n);
          subcats[cat][gi].items.push(n);
          list[gk(cat, n)] = { qty: 0 };
          sched(); addInp.value = ""; renderManage(); renderCats("");
        });
        addRow.appendChild(addInp); gBlock.appendChild(addRow);
        bd.appendChild(gBlock);
      });

    } else {
      // ── NORMAL CATEGORY MANAGEMENT ──
      items.forEach(item => {
        const row = document.createElement("div"); row.className = "manage-row";
        const nm = document.createElement("span"); nm.className = "manage-name"; nm.textContent = item;
        const bE = document.createElement("button"); bE.className = "btn-icon btn-edit"; bE.textContent = "✏️";
        const bD = document.createElement("button"); bD.className = "btn-icon btn-delete"; bD.textContent = "🗑️";
        bE.addEventListener("click", () => {
          const inp = document.createElement("input"); inp.className = "manage-edit-input"; inp.value = item;
          const bS = document.createElement("button"); bS.className = "btn-icon btn-save"; bS.textContent = "✓";
          const bC = document.createElement("button"); bC.className = "btn-icon btn-cancel-edit"; bC.textContent = "✕";
          row.innerHTML = ""; row.appendChild(inp); row.appendChild(bS); row.appendChild(bC); inp.focus(); inp.select();
          const ds = () => {
            const n = inp.value.trim(); if (!n||n===item) { renderManage(); return; }
            const ix = products[cat].indexOf(item); if (ix !== -1) products[cat][ix] = n;
            const ok = gk(cat,item), nk = gk(cat,n); if (list[ok]) { list[nk]=list[ok]; delete list[ok]; }
            sched(); renderManage(); renderCats("");
          };
          bS.addEventListener("click", ds); bC.addEventListener("click", () => renderManage());
          inp.addEventListener("keydown", e => { if(e.key==="Enter") ds(); if(e.key==="Escape") renderManage(); });
        });
        bD.addEventListener("click", () => {
          if (!confirm(`Apagar "${item}"?`)) return;
          products[cat] = products[cat].filter(i => i !== item);
          delete list[gk(cat, item)];
          sched(); renderManage(); renderCats("");
        });
        row.appendChild(nm); row.appendChild(bE); row.appendChild(bD); bd.appendChild(row);
      });
    }

    block.appendChild(bd); c.appendChild(block);
  });
}

// ── SNACK ─────────────────────────────────────────────────────────────────────
function snack(msg, type) { const s=document.getElementById("snackbar"); s.textContent=msg; s.className=type; s.style.display="block"; }
function hideSnack() { document.getElementById("snackbar").style.display="none"; }

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchTo(v) {
  document.querySelectorAll(".hnav-btn").forEach(x => x.classList.toggle("active", x.dataset.view===v));
  document.querySelectorAll(".view").forEach(el => el.classList.toggle("active", el.id===`view-${v}`));
  if (v==="whatsapp") renderWA();
  if (v==="add") renderAdd();
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.querySelectorAll(".hnav-btn").forEach(b => b.addEventListener("click", () => switchTo(b.dataset.view)));
document.getElementById("clear-btn").addEventListener("click", () => {
  if (!confirm("Limpar todas as quantidades?")) return;
  Object.keys(list).forEach(k => { list[k] = { qty: 0 }; });
  sched(); renderCats(""); renderWA();
});
document.getElementById("cat-select").addEventListener("change", e => {
  const cat = e.target.value;
  document.getElementById("new-cat-wrap").style.display = cat === "__nova__" ? "block" : "none";
  const sw = document.getElementById("subcat-select-wrap");
  const ss = document.getElementById("subcat-select");
  if (subcats[cat]) {
    ss.innerHTML = subcats[cat].map((g,i) => `<option value="${i}">${g.name}</option>`).join("");
    sw.style.display = "block";
  } else { sw.style.display = "none"; }
});
document.getElementById("add-btn").addEventListener("click", () => {
  let cat = document.getElementById("cat-select").value;
  const item = document.getElementById("new-item-input").value.trim();
  if (cat === "__nova__") cat = document.getElementById("new-cat-input").value.trim();
  if (!cat || !item) return;
  if (!products[cat]) products[cat] = [];
  if (!products[cat].includes(item)) products[cat].push(item);
  // Add to subcat if applicable
  if (subcats[cat]) {
    const gi = parseInt(document.getElementById("subcat-select").value, 10);
    if (!isNaN(gi) && subcats[cat][gi]) subcats[cat][gi].items.push(item);
  }
  list[gk(cat, item)] = { qty: 0 };
  openCats[cat] = true;
  sched();
  document.getElementById("new-item-input").value = "";
  switchTo("list"); renderCats("");
});
document.getElementById("cancel-btn").addEventListener("click", () => switchTo("list"));
document.getElementById("wa-text").addEventListener("focus", e => e.target.select());

// ── START ─────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
